server:
  port: 2333
  address: 0.0.0.0

lavalink:
  server:
    password: "youshallnotpass"
    sources:
      youtube: false
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false
    bufferDurationMs: 400
    frameBufferDurationMs: 5000
    youtubePlaylistLoadLimit: 6
    playerUpdateInterval: 5
    youtubeSearchEnabled: true
    soundcloudSearchEnabled: true
    gc-warnings: true

  plugins:
#   ─── Enhanced YouTube (replaces built-in) ───
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.0"
      repository: "https://maven.lavalink.dev/releases"

#   ─── LavaSrc: Spotify, Apple Music, Deezer, Yandex, Tidal ───
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.8.1"
      repository: "https://maven.lavalink.dev/releases"

#   ─── LavaSearch: Cross-platform search ───
    - dependency: "com.github.topi314.lavasearch:lavasearch-plugin:1.0.0"
      repository: "https://maven.lavalink.dev/releases"

#   ─── LavaLyrics: Lyrics from multiple providers ───
    - dependency: "com.github.topi314.lavalyrics:lavalyrics-plugin:1.1.0"
      repository: "https://maven.lavalink.dev/releases"

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    clients:
      - MUSIC
      - TVHTML5EMBEDDED
      - IOS
      - WEB

  lavasrc:
    providers:
      - 'scsearch:{title} {author}'
      - 'ytsearch:"{isrc}"'
      - 'ytsearch:{title} {author}'

    spotify:
      clientId: ""
      clientSecret: ""
      countryCode: "US"

    applemusic:
      countryCode: "US"

    deezer:
      masterDecryptionKey: ""
    yandexmusic:
      accessToken: ""
    tidal:
      countryCode: "US"

  lavasearch:
    sources:
      - spotify
      - applemusic
      - deezer
      - youtube
      - soundcloud

  lavalyrics:
    sources:
      - spotify
      - youtube
      - deezer

logging:
  file:
    path: ./logs/

  level:
    root: INFO
    lavalink: INFO

  logback:
    rollingpolicy:
      max-file-size: 25MB
      max-history: 7